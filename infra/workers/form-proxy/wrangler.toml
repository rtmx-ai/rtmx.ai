name = "rtmx-forms"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# account_id: Set via CLOUDFLARE_ACCOUNT_ID env var or in wrangler.toml.local
# account_id = ""

# Custom domain - rtmx.ai zone is on Cloudflare
routes = [{ pattern = "forms.rtmx.ai/*", zone_name = "rtmx.ai" }]

[vars]
RECAPTCHA_SCORE_THRESHOLD = "0.5"
ALLOWED_ORIGIN = "https://rtmx.ai"

# Secrets (set via `wrangler secret put`):
# RECAPTCHA_SECRET_KEY
# HUBSPOT_PORTAL_ID
# HUBSPOT_FORM_GUID_NEWSLETTER
# HUBSPOT_FORM_GUID_WAITLIST
