name = "rtmx-forms"
main = "src/index.ts"
compatibility_date = "2024-12-01"
account_id = "REDACTED"

# Custom domain - requires rtmx.ai zone in Cloudflare
# Uncomment when DNS is configured:
# routes = [{ pattern = "forms.rtmx.ai/*", zone_name = "rtmx.ai" }]

[vars]
HUBSPOT_PORTAL_ID = "REDACTED"
RECAPTCHA_SCORE_THRESHOLD = "0.5"
ALLOWED_ORIGIN = "https://rtmx.ai"

# Secrets (set via `wrangler secret put`):
# RECAPTCHA_SECRET_KEY
