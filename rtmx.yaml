# RTMX Configuration for rtmx.ai website
# See https://rtmx.ai for documentation

rtmx:
  database: docs/rtm_database.csv
  requirements_dir: docs/requirements
  schema: core

  phases:
    1: "Website Foundation"
    2: "Content & Marketing"
    3: "Frontend Engineering"
    4: "Accessibility & UX"

  pytest:
    marker_prefix: "req"
    register_markers: true

  agents:
    claude:
      enabled: true
      config_path: "CLAUDE.md"
    cursor:
      enabled: false
      config_path: ".cursorrules"
    copilot:
      enabled: false
      config_path: ".github/copilot-instructions.md"

  adapters:
    github:
      enabled: false
      repo: "rtmx-ai/rtmx.ai"
      token_env: "GITHUB_TOKEN"
